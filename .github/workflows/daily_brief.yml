name: 📊 Daily Portfolio Morning Brief

on:
  schedule:
    - cron: "30 1 * * 1-6"   # 07:00 AM IST, Mon–Sat

  workflow_dispatch:
    inputs:
      save_local:
        description: "Save report HTML as artifact"
        required: false
        default: "true"

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Verify secrets are set
        run: |
          echo "Checking required secrets..."
          [ -n "$GROQ_API_KEY" ]   && echo "✅ GROQ_API_KEY is set"   || echo "❌ GROQ_API_KEY MISSING"
          [ -n "$GMAIL_USER" ]     && echo "✅ GMAIL_USER is set"     || echo "❌ GMAIL_USER MISSING"
          [ -n "$GMAIL_APP_PASS" ] && echo "✅ GMAIL_APP_PASS is set" || echo "❌ GMAIL_APP_PASS MISSING"
          echo "ℹ️  No news API key needed — using Yahoo Finance (yfinance)"
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}

      - name: 🌐 Test network connectivity
        run: |
          curl -s -o /dev/null -w "finance.yahoo.com: HTTP %{http_code}\n" https://finance.yahoo.com || echo "yahoo: unreachable"
          curl -s -o /dev/null -w "api.groq.com: HTTP %{http_code}\n" https://api.groq.com || echo "groq: unreachable"

      - name: 🚀 Run Morning Brief
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:         ${{ secrets.REPORT_TO }}
          SAVE_REPORT_LOCAL: "true"
        run: python main.py

      - name: 📁 Upload report HTML as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief-report
          path: "*.html"
          retention-days: 7
