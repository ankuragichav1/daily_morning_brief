name: 📊 Daily Portfolio Morning Brief

on:
  schedule:
    - cron: "30 1 * * 1-6"   # 07:00 AM IST, Mon–Sat

  workflow_dispatch:
    inputs:
      save_local:
        description: "Save report HTML as artifact (for debugging)"
        required: false
        default: "true"       # default true so you can always download & inspect

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run Morning Brief
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:         ${{ secrets.REPORT_TO }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY:     ${{ secrets.GNEWS_API_KEY }}
          SAVE_REPORT_LOCAL: ${{ github.event.inputs.save_local || 'true' }}
        run: python main.py

      - name: 📁 Upload report HTML as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief-report
          path: "*.html"
          retention-days: 7
